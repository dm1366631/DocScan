name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Build Release APK (unsigned)
        run: gradle assembleRelease

      - name: Upload APKs to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0.0"
          DEBUG_APK="app/build/outputs/apk/debug/app-debug.apk"
          RELEASE_APK="app/build/outputs/apk/release/app-release-unsigned.apk"

          # Ensure release exists (create if not, update if exists)
          if ! gh release view "$TAG" &>/dev/null; then
            gh release create "$TAG" --title "DocScan $TAG" --notes "DocScan v1.0.0"
          fi

          # Upload/overwrite APKs
          gh release upload "$TAG" "$DEBUG_APK" --clobber
          gh release upload "$TAG" "$RELEASE_APK" --clobber